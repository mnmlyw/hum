<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>hum</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #16181a;
  --fg: #ffffff;
  --fg2: #7b8496;
  --error: #ff6e5e;
  --blue: #5ea1ff;
  --green: #5eff6c;
  --cyan: #5ef1ff;
  --magenta: #ff5ef1;
  --pink: #ff5ea0;
  --orange: #ffbd5e;
  --purple: #bd5eff;
  --font: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  overflow: hidden;
}

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
}

#editor-wrap {
  position: relative;
  flex: 1;
  overflow: hidden;
}

#highlight {
  position: absolute;
  inset: 0;
  padding: 32px 32px 48px;
  /* Honour iOS safe-area insets when present (notch, side bezel). */
  padding-top: max(32px, env(safe-area-inset-top));
  padding-left: max(32px, env(safe-area-inset-left));
  padding-right: max(32px, env(safe-area-inset-right));
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.7;
  white-space: pre;
  overflow: auto;
  pointer-events: none;
  color: var(--fg);
  tab-size: 2;
}

#highlight .cm { color: var(--fg2); }
#highlight .kw { color: var(--magenta); }
#highlight .wf { color: var(--cyan); }
#highlight .nm { color: var(--fg); opacity: 0.5; }
#highlight .nt { color: var(--green); }
#highlight .tr { color: var(--pink); }
#highlight .rs { color: var(--fg2); opacity: 0.3; }
#highlight .bl { color: var(--fg2); opacity: 0.3; }
#highlight .co { color: var(--purple); }
#highlight .fx { color: var(--blue); }
#highlight .nu { color: var(--orange); }
#highlight .er { text-decoration: underline wavy var(--error); }
#highlight .playing.nt,
#highlight .playing.tr { background: var(--cyan); color: var(--bg); border-radius: 2px; }
#highlight .playing.rs { opacity: 0.7; }

#editor {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  color: transparent;
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.7;
  padding: 32px 32px 48px;
  /* Match #highlight's safe-area-aware padding so the layers stay aligned. */
  padding-top: max(32px, env(safe-area-inset-top));
  padding-left: max(32px, env(safe-area-inset-left));
  padding-right: max(32px, env(safe-area-inset-right));
  border: none;
  outline: none;
  resize: none;
  tab-size: 2;
  white-space: pre;
  overflow: auto;
  caret-color: var(--fg);
  z-index: 1;
}

#editor::placeholder {
  color: var(--fg2);
}

#footer {
  z-index: 2;
  border-top: 1px solid #1e2124;
  background: var(--bg);
  /* Bottom inset keeps the home indicator from overlapping controls. */
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

#canvas {
  display: block;
  width: 100%;
  height: 48px;
}

#info-bar {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px 12px;
  padding: 6px 16px;
  font-size: 11px;
  color: var(--fg2);
  user-select: none;
}

#controls {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 16px;
  font-size: 11px;
  color: var(--fg2);
  user-select: none;
}

#spacer2 { flex: 1; }

#controls button {
  background: none;
  border: none;
  color: var(--fg2);
  font-family: var(--font);
  font-size: 11px;
  cursor: pointer;
  padding: 2px 0;
  letter-spacing: 0.5px;
}

#controls button:hover { color: var(--fg); }
#play-btn.playing { color: var(--cyan); }

#step-bar {
  display: flex;
  align-items: center;
  gap: 2px;
}

.step-dot {
  width: 4px;
  height: 4px;
  flex-shrink: 0;
  border-radius: 1px;
  background: #2a2d32;
  transition: background 0.08s;
}

.step-dot.beat {
  background: var(--fg2);
}

.step-dot.active {
  background: var(--cyan);
}

#spacer { flex: 1; }

#channel-info {
  font-size: 11px;
  color: var(--fg2);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Mobile / touch ─────────────────────────────────────────────────
   Activated on coarse-pointer, no-hover devices (phones + tablets).
   Desktop browsers — including the Playwright suite's Chromium —
   never match these queries, so existing tests stay unaffected. */
#mobile-toolbar { display: none; }

@media (hover: none) and (pointer: coarse) {
  /* iOS auto-zooms <input>/<textarea> when font-size < 16px on focus.
     Bumping to 16px keeps zoom from re-flowing the editor mid-tap. */
  #editor, #highlight {
    font-size: 16px;
    padding-bottom: 56px;
  }

  /* Larger tap targets on the controls row. */
  #controls { padding: 8px 16px; gap: 16px; }
  #controls button {
    font-size: 13px;
    padding: 10px 4px;
    min-height: 36px;
  }

  #info-bar { padding: 8px 16px; font-size: 13px; }
  #channel-info { font-size: 13px; }
  .step-dot { width: 6px; height: 6px; }

  /* Pattern-token input toolbar — common tokens that are awkward to
     reach on mobile keyboards. Inserts at the caret on tap. */
  #mobile-toolbar {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding: 8px 12px;
    background: var(--bg);
    border-top: 1px solid #1e2124;
    -webkit-overflow-scrolling: touch;
  }
  #mobile-toolbar button {
    flex-shrink: 0;
    min-width: 44px;
    height: 36px;
    background: #22252a;
    border: none;
    border-radius: 6px;
    color: var(--fg);
    font-family: var(--font);
    font-size: 16px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  #mobile-toolbar button:active { background: #32363c; }
}
</style>
</head>
<body>
<div id="app">
  <div id="editor-wrap">
    <div id="highlight"></div>
    <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"
      placeholder="bpm 120&#10;bass saw c2 . e2 . g2 . c2 e2 : lpf 400"></textarea>
  </div>
  <div id="footer">
    <div id="mobile-toolbar">
      <button data-insert=". " aria-label="rest">.</button>
      <button data-insert="x " aria-label="trigger">x</button>
      <button data-insert="| " aria-label="bar line">|</button>
      <button data-insert=" : " aria-label="effects separator">:</button>
      <button data-insert="#" aria-label="sharp">#</button>
      <button data-insert="bpm " aria-label="bpm">bpm</button>
    </div>
    <canvas id="canvas"></canvas>
    <div id="info-bar">
      <div id="step-bar"></div>
      <div id="spacer"></div>
      <div id="channel-info"></div>
    </div>
    <div id="controls">
      <button id="play-btn">play</button>
      <div id="spacer2"></div>
      <button id="load-btn">load</button>
      <button id="save-btn">save</button>
    </div>
  </div>
</div>

<script>
// ── Constants & Note Table ──────────────────────────────────────────

const NOTE_NAMES = ['c','c#','d','d#','e','f','f#','g','g#','a','a#','b'];
const FLAT_MAP = { 'db':'c#','eb':'d#','fb':'e','gb':'f#','ab':'g#','bb':'a#','cb':'b' };
const WAVEFORM_MAP = { sin:'sine', tri:'triangle', sqr:'square', saw:'sawtooth' };
const WAVEFORMS = ['sin','tri','sqr','saw','noise'];
const MAX_CHANNELS = 8;
const DEFAULT_BPM = 120;
const SCHEDULE_AHEAD = 0.15;
const TICK_MS = 25;

// Web Worker for timer — immune to background tab throttling
const timerWorkerBlob = new Blob([`
let id = null;
onmessage = function(e) {
  if (e.data.cmd === 'start') {
    if (id !== null) clearInterval(id);
    id = setInterval(function() { postMessage('tick'); }, e.data.interval);
  } else if (e.data.cmd === 'stop') {
    if (id !== null) { clearInterval(id); id = null; }
  }
};
`], { type: 'text/javascript' });
const timerWorker = new Worker(URL.createObjectURL(timerWorkerBlob));

// Generate note frequencies: A4 = 440Hz
const NOTE_FREQ = {};
for (let oct = 0; oct <= 8; oct++) {
  for (let i = 0; i < 12; i++) {
    const midi = oct * 12 + i + 12; // C0 = MIDI 12
    const freq = 440 * Math.pow(2, (midi - 69) / 12);
    NOTE_FREQ[NOTE_NAMES[i] + oct] = freq;
  }
}
// Add flat aliases
for (let oct = 0; oct <= 8; oct++) {
  for (const [flat, sharp] of Object.entries(FLAT_MAP)) {
    const sharpOct = (flat === 'cb') ? oct - 1 : oct;
    if (sharpOct >= 0 && sharpOct <= 8) {
      NOTE_FREQ[flat + oct] = NOTE_FREQ[sharp + sharpOct];
    }
  }
}

// ── Parser ──────────────────────────────────────────────────────────

// Pattern step shape — one factory per kind so future kinds extend in one
// place instead of forking the parser. Every step has a `type` discriminator
// that the scheduler dispatches on; payload fields are kind-specific.
const Step = {
  rest: () => ({ type: 'rest' }),
  trigger: () => ({ type: 'trigger' }),
  note: (freq, name) => ({ type: 'note', freq, name })
};

// Parse number with shorthand: .05 -> 0.05, 6k -> 6000
function parseNum(s) {
  if (!s) return NaN;
  s = s.trim().toLowerCase();
  if (s.endsWith('k')) return parseFloat(s.slice(0, -1)) * 1000;
  return parseFloat(s);
}

const EFFECT_NAMES = new Set(['lpf','hpf','decay','vol']);

function parse(text) {
  const result = { bpm: DEFAULT_BPM, channels: [], errors: [] };

  // Join continuation lines: indented lines append to the previous line
  const rawLines = text.split('\n');
  const lines = [];
  for (const raw of rawLines) {
    // Strip comments before joining so a comment on a continuation line
    // doesn't swallow subsequent continuations
    const stripped = raw.replace(/--.*$/, '');
    if (stripped.match(/^[ \t]+\S/) && lines.length > 0) {
      lines[lines.length - 1] += ' ' + stripped.trim();
    } else {
      lines.push(stripped);
    }
  }

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    const line = raw.replace(/--.*$/, '').trim();
    if (!line) continue;

    try {
      // BPM
      const bpmMatch = line.match(/^bpm\s+(\d+\.?\d*k?)$/i);
      if (bpmMatch) {
        result.bpm = parseNum(bpmMatch[1]);
        if (result.bpm < 20 || result.bpm > 999) {
          result.errors.push({ line: i + 1, message: 'bpm must be 20-999' });
          result.bpm = Math.max(20, Math.min(999, result.bpm));
        }
        continue;
      }

      // Channel definition: name waveform pattern [: effects]
      const tokens = line.split(/\s+/);
      if (tokens.length < 3) continue;

      const waveform = tokens[1].toLowerCase();
      if (!WAVEFORMS.includes(waveform)) {
        // Not a channel definition
        if (line.match(/^[a-zA-Z]/)) {
          result.errors.push({ line: i + 1, message: `unknown waveform: ${tokens[1]}` });
        }
        continue;
      }

      if (result.channels.length >= MAX_CHANNELS) {
        result.errors.push({ line: i + 1, message: 'maximum 8 channels' });
        continue;
      }

      const name = tokens[0];

      // Split on : to separate pattern from effects
      const colonIdx = line.indexOf(':');
      // Find where pattern starts: after "name waveform"
      const afterWaveform = line.match(/^\S+\s+\S+/)[0].length;
      let patternStr, effectsStr;
      if (colonIdx !== -1) {
        patternStr = line.slice(afterWaveform, colonIdx).trim();
        effectsStr = line.slice(colonIdx + 1).trim();
      } else {
        patternStr = line.slice(afterWaveform).trim();
        effectsStr = '';
      }

      // Pattern: space-separated tokens, | is bar line (ignored), . is rest
      const patTokens = patternStr.split(/\s+/).filter(t => t && t !== '|' && t !== ',');
      const pattern = [];
      for (const token of patTokens) {
        const t = token.toLowerCase();
        if (t === '.' || t === '_') {
          pattern.push(Step.rest());
        } else if (t === 'x') {
          pattern.push(Step.trigger());
        } else {
          const freq = NOTE_FREQ[t];
          if (freq !== undefined) {
            pattern.push(Step.note(freq, t));
          } else {
            result.errors.push({ line: i + 1, message: `unknown note: ${token}` });
            pattern.push(Step.rest());
          }
        }
      }

      if (pattern.length === 0) {
        result.errors.push({ line: i + 1, message: 'empty pattern' });
        continue;
      }

      // Effects: name value pairs after :
      const effects = { lpf: null, hpf: null, decay: null, vol: 1.0 };
      if (effectsStr) {
        const fxTokens = effectsStr.split(/\s+/);
        for (let j = 0; j < fxTokens.length; j += 2) {
          const fx = fxTokens[j].toLowerCase();
          const val = parseNum(fxTokens[j + 1]);
          if (!EFFECT_NAMES.has(fx)) {
            result.errors.push({ line: i + 1, message: `unknown effect: ${fx}` });
            continue;
          }
          // Number.isFinite rejects NaN, Infinity, and -Infinity alike.
          // Non-finite values would reach scheduler.tick and throw RangeError
          // from exponentialRampToValueAtTime / AudioParam assignment, which
          // leaks a worker listener on the half-started scheduler.
          if (!Number.isFinite(val)) {
            result.errors.push({ line: i + 1, message: `invalid value for ${fx}` });
            continue;
          }
          if (fx === 'lpf') effects.lpf = val;
          else if (fx === 'hpf') effects.hpf = val;
          // Clamp to >= 0: the scheduler hands decay straight to
          // exponentialRampToValueAtTime(0.001, t + decay), and a negative
          // endTime would throw inside tick() and kill the scheduler.
          else if (fx === 'decay') effects.decay = Math.max(0, val);
          else if (fx === 'vol') effects.vol = Math.max(0, Math.min(1, val));
        }
      }

      result.channels.push({ name, waveform, pattern, effects });
    } catch (e) {
      result.errors.push({ line: i + 1, message: e.message });
    }
  }

  return result;
}

// ── Audio Engine ────────────────────────────────────────────────────

const LPF_OPEN = 20000;
const HPF_OPEN = 0;

let audioCtx = null;
let noiseBuffer = null;
let analyserNode = null;
const channelNodes = [];         // ordered view (parse order); never reassigned
const channelNodesByName = new Map(); // registry keyed by stable name#occurrence
const pendingRemovals = new Set();    // nodes spliced out of channelNodes but not yet disconnected
let scheduler = null;
let isPlaying = false;
let starting = false;
let schedulerCreations = 0;

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new AudioContext();
    const compressor = audioCtx.createDynamicsCompressor();
    compressor.threshold.value = -12;
    compressor.knee.value = 6;
    compressor.ratio.value = 8;
    compressor.attack.value = 0.003;
    compressor.release.value = 0.1;
    compressor.connect(audioCtx.destination);
    analyserNode = audioCtx.createAnalyser();
    analyserNode.fftSize = 2048;
    analyserNode.connect(compressor);
    const size = audioCtx.sampleRate * 2;
    noiseBuffer = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function createSource(waveform) {
  if (waveform === 'noise') {
    const s = audioCtx.createBufferSource();
    s.buffer = noiseBuffer;
    s.loop = true;
    return s;
  }
  const s = audioCtx.createOscillator();
  s.type = WAVEFORM_MAP[waveform];
  s.frequency.value = 0;
  return s;
}

function makeGain(value) {
  const g = audioCtx.createGain();
  g.gain.value = value;
  return g;
}

function makeFilter(type, freq) {
  const f = audioCtx.createBiquadFilter();
  f.type = type;
  f.Q.value = 0.707;
  f.frequency.value = freq;
  return f;
}

// Connect a sequence of audio nodes head → tail.
function chain(...nodes) {
  for (let i = 0; i < nodes.length - 1; i++) nodes[i].connect(nodes[i + 1]);
}

function createChannelNode(ch, registryKey) {
  const source = createSource(ch.waveform);
  const sourceGain = makeGain(1);
  const envelopeGain = makeGain(0);
  const filterHPF = makeFilter('highpass', ch.effects.hpf ?? HPF_OPEN);
  const filterLPF = makeFilter('lowpass', ch.effects.lpf ?? LPF_OPEN);
  const volumeGain = makeGain(ch.effects.vol);

  chain(source, sourceGain, envelopeGain, filterHPF, filterLPF, volumeGain, analyserNode);
  source.start();

  return {
    source, sourceGain, envelopeGain,
    filterLPF, filterHPF, volumeGain,
    channel: ch, registryKey,
    notBefore: 0,      // scheduler skips steps where t < notBefore
    stoppedAt: Infinity // scheduler skips steps where t >= stoppedAt
  };
}

function disconnectNode(node) {
  try { node.source.stop(); } catch (e) {}
  try { node.source.disconnect(); } catch (e) {}
  try { node.sourceGain.disconnect(); } catch (e) {}
  try { node.envelopeGain.disconnect(); } catch (e) {}
  try { node.filterLPF.disconnect(); } catch (e) {}
  try { node.filterHPF.disconnect(); } catch (e) {}
  try { node.volumeGain.disconnect(); } catch (e) {}
}

// Assign stable registry keys that tolerate duplicate channel names:
// first occurrence of "lead" is "lead"; second is "lead#2", etc.
function keysFor(channels) {
  const counts = {};
  const keys = [];
  for (const ch of channels) {
    counts[ch.name] = (counts[ch.name] || 0) + 1;
    keys.push(counts[ch.name] === 1 ? ch.name : `${ch.name}#${counts[ch.name]}`);
  }
  return keys;
}

function buildGraph(hum) {
  teardownGraph();
  const keys = keysFor(hum.channels);
  for (let i = 0; i < hum.channels.length; i++) {
    const node = createChannelNode(hum.channels[i], keys[i]);
    channelNodes.push(node);
    channelNodesByName.set(keys[i], node);
  }
}

function teardownGraph() {
  const now = audioCtx.currentTime;
  const silenceAndDisconnect = (node) => {
    try {
      node.envelopeGain.gain.cancelScheduledValues(0);
      node.envelopeGain.gain.setValueAtTime(0, now);
    } catch (e) {}
    disconnectNode(node);
  };
  for (const node of channelNodes) silenceAndDisconnect(node);
  // Drain nodes that were removed mid-play but whose async disconnect setTimeout
  // hasn't fired yet — otherwise their pre-scheduled envelope events keep
  // playing through the still-connected graph until the boundary.
  for (const node of pendingRemovals) silenceAndDisconnect(node);
  pendingRemovals.clear();
  channelNodes.length = 0;
  channelNodesByName.clear();
}

// ── Scheduler ───────────────────────────────────────────────────────

// Cancel queued envelope and frequency events on a channel node from time t onward.
function cancelChannelEventsFrom(node, t) {
  try { node.envelopeGain.gain.cancelScheduledValues(t); } catch (e) {}
  if (node.source && node.source.frequency) {
    try { node.source.frequency.cancelScheduledValues(t); } catch (e) {}
  }
}

// Write one pattern step's envelope (and frequency for pitched notes) at time t.
function scheduleStep(node, step, t, dur) {
  const ch = node.channel;
  const s = ch.pattern[step % ch.pattern.length];
  const g = node.envelopeGain.gain;
  g.cancelScheduledValues(t);
  if (s.type === 'rest') {
    g.setValueAtTime(0, t);
    return;
  }
  if (s.type === 'note' && ch.waveform !== 'noise') {
    node.source.frequency.setValueAtTime(s.freq, t);
  }
  g.setValueAtTime(1, t);
  if (ch.effects.decay != null) {
    g.exponentialRampToValueAtTime(0.001, t + ch.effects.decay);
  } else {
    // Hold full gain until the last 10ms of the step, then linear-ramp to 0
    // so the next step's setValueAtTime(1) doesn't jump from a non-zero floor.
    g.setValueAtTime(1, t + dur - 0.01);
    g.linearRampToValueAtTime(0, t + dur);
  }
}

class Scheduler {
  constructor(audioCtx, nodes, stepDuration) {
    this.ctx = audioCtx;
    this.nodes = nodes;       // shared reference to channelNodes; mutated in place
    this.dur = stepDuration;
    this.step = 0;            // next step index to schedule
    this.t0 = 0;
    this.tid = null;
  }

  start() {
    this.t0 = this.ctx.currentTime;
    this.step = 0;
    this._workerTick = () => this.tick();
    timerWorker.addEventListener('message', this._workerTick);
    timerWorker.postMessage({ cmd: 'start', interval: TICK_MS });
    this.tick();
  }

  stop() {
    timerWorker.postMessage({ cmd: 'stop' });
    if (this._workerTick) {
      timerWorker.removeEventListener('message', this._workerTick);
      this._workerTick = null;
    }
  }

  getPhase() {
    return (this.ctx.currentTime - this.t0) / this.dur;
  }

  getVisualStep() {
    return Math.floor(this.getPhase());
  }

  // Called from liveUpdate before a structural mutation at `applyAt`:
  // rewind so the next tick re-schedules from that boundary onward,
  // and cancel already-queued envelope/frequency events past it.
  rewindTo(applyAt) {
    const boundaryStep = Math.ceil((applyAt - this.t0) / this.dur - 1e-6);
    if (boundaryStep < this.step) this.step = boundaryStep;
    for (const node of this.nodes) cancelChannelEventsFrom(node, applyAt);
  }

  // Preserve fractional phase across a tempo change, then rewind so future
  // events get rewritten against the new grid.
  rebaseForTempo(newDur) {
    const now = this.ctx.currentTime;
    const phase = (now - this.t0) / this.dur;
    this.t0 = now - phase * newDur;
    this.dur = newDur;
    this.step = Math.ceil(phase - 1e-6);
    // Cancel only past the next boundary — preserve any in-flight envelope ramp.
    const cancelFrom = this.t0 + this.step * this.dur;
    for (const node of this.nodes) cancelChannelEventsFrom(node, cancelFrom);
  }

  tick() {
    const ahead = this.ctx.currentTime + SCHEDULE_AHEAD;
    while (this.t0 + this.step * this.dur < ahead) {
      const t = this.t0 + this.step * this.dur;
      for (const node of this.nodes) {
        if (t >= node.notBefore && t < node.stoppedAt) {
          scheduleStep(node, this.step, t, this.dur);
        }
      }
      this.step++;
    }
  }
}

// ── Visualizer ──────────────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const stepBar = document.getElementById('step-bar');
let stepDots = [];
let vizBuffer = null;
let stepSpanMap = {};
let prevPlaying = [];
let wasPlaying = false;

function resizeCanvas() {
  canvas.width = canvas.clientWidth * devicePixelRatio;
  canvas.height = canvas.clientHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

new ResizeObserver(resizeCanvas).observe(canvas);
resizeCanvas();

function buildStepDots(count) {
  stepBar.innerHTML = '';
  stepDots = [];
  for (let i = 0; i < count; i++) {
    const dot = document.createElement('div');
    dot.className = 'step-dot' + (i % 8 === 0 ? ' beat' : '');
    stepBar.appendChild(dot);
    stepDots.push(dot);
  }
}

buildStepDots(8);

function drawViz() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;

  ctx.clearRect(0, 0, w, h);

  if (analyserNode && isPlaying) {
    wasPlaying = true;
    const bufLen = analyserNode.frequencyBinCount;
    if (!vizBuffer || vizBuffer.length !== bufLen) vizBuffer = new Uint8Array(bufLen);
    analyserNode.getByteTimeDomainData(vizBuffer);

    ctx.beginPath();
    const sliceWidth = w / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = vizBuffer[i] / 128.0;
      const y = (v * h) / 2;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
      x += sliceWidth;
    }
    ctx.lineTo(w, h / 2);
    ctx.strokeStyle = 'rgba(94, 241, 255, 0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = 'rgba(94, 241, 255, 0.04)';
    ctx.fill();

    // Update step dots + note playhead
    if (scheduler && stepDots.length > 0) {
      const vs = scheduler.getVisualStep();
      const activeIdx = vs % stepDots.length;
      for (let i = 0; i < stepDots.length; i++) {
        stepDots[i].classList.toggle('active', i === activeIdx);
      }
      for (const el of prevPlaying) el.classList.remove('playing');
      prevPlaying = [];
      for (let i = 0; i < channelNodes.length; i++) {
        const ch = channelNodes[i].channel;
        const el = stepSpanMap[i + '-' + (vs % ch.pattern.length)];
        if (el) { el.classList.add('playing'); prevPlaying.push(el); }
      }
    }
  } else if (wasPlaying) {
    // One-shot cleanup on the playing → not-playing edge, so we don't burn
    // ~3,840 classList ops/sec (60fps × up to 64 step dots) while idle.
    for (const dot of stepDots) dot.classList.remove('active');
    for (const el of prevPlaying) el.classList.remove('playing');
    prevPlaying = [];
    wasPlaying = false;
  }

  requestAnimationFrame(drawViz);
}

drawViz();

// ── Editor & Live Evaluation ────────────────────────────────────────

const editor = document.getElementById('editor');
const highlight = document.getElementById('highlight');
const playBtn = document.getElementById('play-btn');
const channelInfo = document.getElementById('channel-info');
let debounceTimer = null;

// ── Syntax Highlighter ──────────────────────────────────────────────

const NUM_RE = /^\.?\d[\d.]*k?$/;

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function span(cls, text) {
  return `<span class="${cls}">${esc(text)}</span>`;
}

function ptSpan(cls, text, ch, s) {
  if (ch !== null && s !== null) {
    return `<span class="pt ${cls}" data-ch="${ch}" data-s="${s}">${esc(text)}</span>`;
  }
  return span(cls, text);
}

function highlightTokens(code, comment, chIdx, stepCounter) {
  const colonIdx = code.indexOf(':');
  const patPart = colonIdx !== -1 ? code.slice(0, colonIdx) : code;
  const fxPart = colonIdx !== -1 ? code.slice(colonIdx) : '';
  let out = '';
  const ch = chIdx !== undefined ? chIdx : null;

  const patTokens = patPart.split(/(\s+)/);
  for (const ct of patTokens) {
    if (ct === '') continue;
    if (ct.match(/^\s+$/)) { out += esc(ct); continue; }
    const low = ct.toLowerCase();
    const s = (stepCounter && ch !== null) ? stepCounter.n : null;
    if (low === '.' || low === '_') { out += ptSpan('rs', ct, ch, s); if (stepCounter) stepCounter.n++; }
    else if (low === 'x') { out += ptSpan('tr', ct, ch, s); if (stepCounter) stepCounter.n++; }
    else if (low === '|' || low === ',') out += span('bl', ct);
    else if (NOTE_FREQ[low] !== undefined) { out += ptSpan('nt', ct, ch, s); if (stepCounter) stepCounter.n++; }
    else { out += ptSpan('er', ct, ch, s); if (stepCounter) stepCounter.n++; }
  }

  if (fxPart) {
    out += span('co', ':');
    const fxBody = fxPart.slice(1);
    const fxTokens = fxBody.split(/(\s+)/);
    for (const ft of fxTokens) {
      if (ft === '') continue;
      if (ft.match(/^\s+$/)) out += esc(ft);
      else if (EFFECT_NAMES.has(ft.toLowerCase())) out += span('fx', ft);
      else if (NUM_RE.test(ft)) out += span('nu', ft);
      else out += span('er', ft);
    }
  }

  return out + (comment ? span('cm', comment) : '');
}

function highlightLine(line, prevIsChannel, chIdx, stepCounter) {
  // Comment
  const commentIdx = line.indexOf('--');
  let code = line, comment = '';
  if (commentIdx !== -1) {
    code = line.slice(0, commentIdx);
    comment = line.slice(commentIdx);
  }

  if (!code.trim()) {
    return esc(code) + (comment ? span('cm', comment) : '');
  }

  const trimmed = code.trim();

  // Continuation line (indented)
  if (code.match(/^[ \t]+\S/) && prevIsChannel) {
    const lead = code.match(/^(\s*)/)[1];
    return esc(lead) + highlightTokens(code.trimStart(), comment, chIdx, stepCounter);
  }

  // BPM line
  if (trimmed.match(/^bpm\s/i)) {
    const parts = trimmed.split(/(\s+)/);
    let out = '';
    const lead = code.match(/^(\s*)/)[1];
    out += esc(lead);
    out += span('kw', parts[0]);
    for (let i = 1; i < parts.length; i++) {
      out += parts[i].match(/\s/) ? esc(parts[i]) : span('nu', parts[i]);
    }
    return out + (comment ? span('cm', comment) : '');
  }

  // Channel definition: name waveform pattern [: effects]
  const tokens = trimmed.split(/\s+/);
  if (tokens.length >= 2 && WAVEFORMS.includes(tokens[1].toLowerCase())) {
    const lead = code.match(/^(\s*)/)[1];
    let out = esc(lead);

    // Highlight name and waveform, then delegate the rest
    const codeTokens = code.trimStart().split(/(\s+)/);
    let headerDone = false;
    let tokenIdx = 0;
    let restStart = 0;
    for (const ct of codeTokens) {
      if (ct.match(/^\s+$/)) { out += esc(ct); restStart += ct.length; continue; }
      if (tokenIdx === 0) { out += span('nm', ct); }
      else if (tokenIdx === 1) { out += span('wf', ct); headerDone = true; }
      restStart += ct.length;
      tokenIdx++;
      if (headerDone) break;
    }

    // Pattern + effects after the header
    const remainder = code.trimStart().slice(restStart);
    if (remainder.trim()) {
      out += highlightTokens(remainder, '', chIdx, stepCounter);
    }

    return out + (comment ? span('cm', comment) : '');
  }

  // Possible channel def with invalid waveform
  if (tokens.length >= 2 && !code.match(/^[ \t]/)
      && tokens[0].match(/^[a-zA-Z_]/) && !NOTE_FREQ[tokens[0].toLowerCase()]
      && !tokens[0].match(/^bpm$/i)) {
    const lead = code.match(/^(\s*)/)[1];
    const parts = code.trimStart().split(/(\s+)/);
    let out = esc(lead);
    let ti = 0;
    for (const p of parts) {
      if (p.match(/^\s+$/)) { out += esc(p); continue; }
      if (ti === 0) out += span('nm', p);
      else if (ti === 1) out += span('er', p);
      else out += esc(p);
      ti++;
    }
    return out + (comment ? span('cm', comment) : '');
  }

  // Fallback
  return esc(code) + (comment ? span('cm', comment) : '');
}

function updateHighlight() {
  const text = editor.value;
  const lines = text.split('\n');
  let prevIsChannel = false;
  let chIdx = -1;
  let stepCounter = null;
  const out = [];
  for (const line of lines) {
    const trimmed = line.replace(/--.*$/, '').trim();
    const tokens = trimmed.split(/\s+/);
    if (tokens.length >= 2 && WAVEFORMS.includes((tokens[1] || '').toLowerCase())) {
      chIdx++;
      stepCounter = { n: 0 };
      prevIsChannel = true;
    } else if (line.match(/^[ \t]+\S/) && prevIsChannel) {
      // continuation
    } else {
      prevIsChannel = false;
      stepCounter = null;
    }
    out.push(highlightLine(line, prevIsChannel, chIdx, stepCounter));
  }
  highlight.innerHTML = out.join('\n') + '\n';
  stepSpanMap = {};
  for (const el of highlight.querySelectorAll('.pt')) {
    stepSpanMap[el.dataset.ch + '-' + el.dataset.s] = el;
  }
}

// Sync scroll
editor.addEventListener('scroll', () => {
  highlight.scrollTop = editor.scrollTop;
  highlight.scrollLeft = editor.scrollLeft;
});

// Tab handling
function insertAtCaret(text) {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  editor.value = editor.value.slice(0, start) + text + editor.value.slice(end);
  editor.selectionStart = editor.selectionEnd = start + text.length;
  onInput();
}

editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    insertAtCaret('  ');
  }
});

// Mobile input toolbar — taps insert tokens at the caret. The toolbar
// itself is hidden on desktop via a coarse-pointer media query, so this
// listener is harmless when the buttons aren't visible.
document.getElementById('mobile-toolbar').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-insert]');
  if (!btn) return;
  // mousedown would be lower-latency, but we want the tap to still
  // register if the user drags slightly before lifting their finger.
  editor.focus();
  insertAtCaret(btn.dataset.insert);
});

editor.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(onInput, 300);
  updateHighlight();
});

function onInput() {
  updateHighlight();
  const text = editor.value;
  const hum = parse(text);

  // Update channel info
  channelInfo.textContent = hum.channels.length > 0
    ? hum.channels.map(c => `${c.name}: ${c.waveform}`).join('  ')
    : '';

  // Find max pattern length for step dots; cap at 64, fall back to 8 placeholders.
  // Compute the target count once and compare to the actual DOM count so an
  // empty/no-op edit doesn't force a redundant innerHTML rebuild every onInput.
  const maxLen = hum.channels.reduce((m, c) => Math.max(m, c.pattern.length), 0);
  const desiredDots = Math.min(maxLen || 8, 64);
  if (desiredDots !== stepDots.length) buildStepDots(desiredDots);

  // Live update while playing
  if (isPlaying && audioCtx) {
    liveUpdate(hum);
  }
}

// ── Live Coding ─────────────────────────────────────────────────────

let lastParseKey = '';

function humKey(hum) {
  return hum.bpm + '|' + hum.channels.map(c =>
    c.name + c.waveform +
    c.pattern.map(s => s.type === 'note' ? s.freq : s.type).join(',') +
    JSON.stringify(c.effects)
  ).join('|');
}

// Next step boundary beyond the scheduler lookahead, with a small safety margin
// so our mutation lands on a fresh step the scheduler hasn't written yet.
function nextBoundary() {
  const now = audioCtx.currentTime;
  const safe = now + SCHEDULE_AHEAD + 0.02;
  const phase = (safe - scheduler.t0) / scheduler.dur;
  const boundaryStep = Math.ceil(phase);
  return scheduler.t0 + boundaryStep * scheduler.dur;
}

function swapWaveform(node, newWaveform, applyAt) {
  const newSource = createSource(newWaveform);
  const newSrcGain = audioCtx.createGain();
  newSrcGain.gain.setValueAtTime(0, audioCtx.currentTime);
  newSource.connect(newSrcGain);
  newSrcGain.connect(node.envelopeGain);
  newSource.start(applyAt);

  const oldSource = node.source;
  const oldSrcGain = node.sourceGain;

  // 5ms equal-power-ish crossfade at the boundary
  const fade = 0.005;
  oldSrcGain.gain.cancelScheduledValues(applyAt);
  oldSrcGain.gain.setValueAtTime(1, applyAt);
  oldSrcGain.gain.linearRampToValueAtTime(0, applyAt + fade);
  newSrcGain.gain.setValueAtTime(0, applyAt);
  newSrcGain.gain.linearRampToValueAtTime(1, applyAt + fade);

  node.source = newSource;
  node.sourceGain = newSrcGain;

  const delayMs = Math.max(0, (applyAt - audioCtx.currentTime) * 1000) + 60;
  setTimeout(() => {
    try { oldSource.stop(); } catch (e) {}
    try { oldSource.disconnect(); } catch (e) {}
    try { oldSrcGain.disconnect(); } catch (e) {}
  }, delayMs);
}

function addChannel(ch, registryKey, applyAt) {
  const node = createChannelNode(ch, registryKey);
  node.notBefore = applyAt;
  channelNodes.push(node);
  channelNodesByName.set(registryKey, node);
}

function removeChannel(node, applyAt) {
  node.stoppedAt = applyAt;
  const g = node.envelopeGain.gain;
  try {
    g.cancelScheduledValues(applyAt);
    g.setTargetAtTime(0, applyAt, 0.005);
  } catch (e) {}

  const idx = channelNodes.indexOf(node);
  if (idx >= 0) channelNodes.splice(idx, 1);
  channelNodesByName.delete(node.registryKey);
  pendingRemovals.add(node);

  const delayMs = Math.max(0, (applyAt - audioCtx.currentTime) * 1000) + 80;
  setTimeout(() => {
    pendingRemovals.delete(node);
    disconnectNode(node);
  }, delayMs);
}

// Apply an effect delta in place with a short time-constant ramp to avoid zipper noise.
function applyEffectDeltas(node, newCh) {
  const now = audioCtx.currentTime;
  const old = node.channel.effects;
  const nw = newCh.effects;
  const tc = 0.01;
  if (old.vol !== nw.vol) {
    node.volumeGain.gain.setTargetAtTime(nw.vol, now, tc);
  }
  const newLPF = nw.lpf ?? LPF_OPEN;
  const oldLPF = old.lpf ?? LPF_OPEN;
  if (newLPF !== oldLPF) {
    node.filterLPF.frequency.setTargetAtTime(newLPF, now, tc);
  }
  const newHPF = nw.hpf ?? HPF_OPEN;
  const oldHPF = old.hpf ?? HPF_OPEN;
  if (newHPF !== oldHPF) {
    node.filterHPF.frequency.setTargetAtTime(newHPF, now, tc);
  }
}

function liveUpdate(hum) {
  const key = humKey(hum);
  if (key === lastParseKey) return;
  // Suppress audio diff while source is broken or empty; keep playing current graph.
  if (hum.channels.length === 0 || hum.errors.length > 0) return;
  lastParseKey = key;

  // 1. Tempo — rebase phase before anything else so subsequent boundary math uses new dur.
  const newDur = 60 / hum.bpm / 2;
  if (scheduler && Math.abs(newDur - scheduler.dur) > 1e-9) {
    scheduler.rebaseForTempo(newDur);
  }

  const newKeys = keysFor(hum.channels);
  const newKeySet = new Set(newKeys);
  const oldKeySet = new Set(channelNodes.map(n => n.registryKey));

  // 2. Remove channels no longer present (quantized to next boundary).
  const boundary = nextBoundary();
  let structuralChange = false;
  for (const node of [...channelNodes]) {
    if (!newKeySet.has(node.registryKey)) {
      removeChannel(node, boundary);
      structuralChange = true;
    }
  }

  // 3. Survivors: update pattern/effects in place now; queue waveform swap at boundary.
  const swaps = [];
  for (let i = 0; i < hum.channels.length; i++) {
    const key = newKeys[i];
    const newCh = hum.channels[i];
    const node = channelNodesByName.get(key);
    if (!node) continue; // added below
    if (node.channel.waveform !== newCh.waveform) swaps.push({ node, newCh });
    applyEffectDeltas(node, newCh);
    node.channel = newCh;
  }

  // 4. Add new channels at the boundary; ordering is finalized by step 5.
  for (let i = 0; i < hum.channels.length; i++) {
    const key = newKeys[i];
    if (!oldKeySet.has(key)) {
      addChannel(hum.channels[i], key, boundary);
      structuralChange = true;
    }
  }

  // 5. Rebuild channelNodes in parse order so visual chIdx aligns and the
  //    scheduler iterates in a deterministic sequence.
  channelNodes.length = 0;
  for (const k of newKeys) {
    const node = channelNodesByName.get(k);
    if (node) channelNodes.push(node);
  }

  // 6. Apply waveform swaps + rewind scheduler so the boundary step onward is
  //    rewritten against the new graph (ensures new channels fire on boundary
  //    and removed channels don't).
  if (swaps.length > 0) structuralChange = true;
  if (structuralChange) scheduler.rewindTo(boundary);
  for (const { node, newCh } of swaps) {
    swapWaveform(node, newCh.waveform, boundary);
  }
}

// ── Play / Stop ─────────────────────────────────────────────────────

playBtn.addEventListener('click', () => {
  if (isPlaying) {
    stopPlayback();
  } else {
    startPlayback();
  }
});

async function startPlayback() {
  // Re-entrancy guard: the `await` below opens a window where a second click
  // (or Cmd+Enter, which dispatches a synthetic click) would otherwise race in,
  // build a second scheduler, and leak a worker listener that stop can't reach.
  if (isPlaying || starting) return;
  starting = true;
  try {
    ensureAudioCtx();
    await audioCtx.resume();
    const text = editor.value;
    const hum = parse(text);

    if (hum.channels.length === 0) return;

    buildGraph(hum);
    scheduler = new Scheduler(audioCtx, channelNodes, 60 / hum.bpm / 2);
    schedulerCreations++;
    scheduler.start();
    lastParseKey = humKey(hum);
    isPlaying = true;
    playBtn.textContent = 'stop';
    playBtn.classList.add('playing');
  } finally {
    starting = false;
  }
}

function stopPlayback() {
  if (scheduler) { scheduler.stop(); scheduler = null; }
  teardownGraph();
  lastParseKey = '';
  isPlaying = false;
  playBtn.textContent = 'play';
  playBtn.classList.remove('playing');
}

// ── Init ────────────────────────────────────────────────────────────

editor.value = DEFAULT_HUM;
onInput();

// ── Save / Load ─────────────────────────────────────────────────────

function getTitle() {
  const match = editor.value.match(/--\s*(.+)/);
  return match ? match[1].trim().replace(/[^a-zA-Z0-9_\- ]/g, '').replace(/\s+/g, '-') : 'untitled';
}

function saveFile() {
  const blob = new Blob([editor.value], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = getTitle() + '.hum';
  a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById('save-btn').addEventListener('click', saveFile);

const fileInput = document.createElement('input');
fileInput.type = 'file';
fileInput.accept = '.hum';
fileInput.style.display = 'none';
document.body.appendChild(fileInput);
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) loadFile(fileInput.files[0]);
  fileInput.value = '';
});
document.getElementById('load-btn').addEventListener('click', () => fileInput.click());

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    editor.value = reader.result;
    onInput();
  };
  reader.readAsText(file);
}

// Drag and drop
document.addEventListener('dragover', (e) => { e.preventDefault(); });
document.addEventListener('drop', (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.name.toLowerCase().endsWith('.hum')) loadFile(file);
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    if (isPlaying) {
      // Force-apply the latest edit immediately, bypassing the 300ms debounce.
      // Lets power users land structural changes without waiting on the timer.
      clearTimeout(debounceTimer);
      onInput();
    } else {
      playBtn.click();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveFile();
  }
});

// ── Test hook ───────────────────────────────────────────────────────
//
// `window.__hum` is a load-bearing API for the Playwright suite. Anything
// added here is part of the test contract — adding a field commits future
// edits to keeping it stable. Removing or renaming a field will break the
// test suite. Group new fields by category and prefer narrow, observable
// state over wide handles.
//
// Contract (when ?test=1):
//   parse(text)               — pure parser; same as the live parser.
//   applyEdit(text)           — set editor + run onInput synchronously,
//                               bypassing the 300ms debounce.
//   LPF_OPEN, HPF_OPEN,       — runtime constants tests assert against.
//   SCHEDULE_AHEAD
//   audioCtx, analyser        — live audio graph handles for RMS sampling.
//   scheduler                 — current Scheduler instance (or null).
//   channelNodes              — ordered array of live channel nodes.
//   channelNodesByName        — Map<registryKey, node>.
//   isPlaying                 — boolean.
//   schedulerCreations        — monotonically increasing count of
//                               `new Scheduler` calls (re-entrancy guard).
if (new URLSearchParams(location.search).has('test')) {
  window.__hum = {
    parse,
    LPF_OPEN, HPF_OPEN, SCHEDULE_AHEAD,
    get audioCtx() { return audioCtx; },
    get analyser() { return analyserNode; },
    get scheduler() { return scheduler; },
    get channelNodes() { return channelNodes; },
    get channelNodesByName() { return channelNodesByName; },
    get isPlaying() { return isPlaying; },
    get schedulerCreations() { return schedulerCreations; },
    applyEdit(text) {
      editor.value = text;
      onInput();
    }
  };
}
